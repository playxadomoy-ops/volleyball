name: Build Android APK and Send to Telegram

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Cache Buildozer global directory
      uses: actions/cache@v4
      with:
        path: ~/.buildozer
        key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev tk-dev libgdbm-compat-dev liblzma-dev lzma
        pip3 install --user --upgrade "buildozer>=1.5.0" Cython virtualenv

    - name: Prepare file for Android Build
      run: |
        # Тимчасово перейменовуємо оригінальний main.py, якщо він є
        if [ -f main.py ]; then mv main.py main_backup.py; fi
        # Копіюємо ваш файл під назвою volleybolll.py (з трьома 'l') в main.py для збірки
        cp volleybolll.py main.py

    - name: Build APK with Buildozer
      run: |
        export PATH=$PATH:~/.local/bin
        yes | buildozer -v android debug
        
    - name: Send APK to Telegram
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        APK_PATH=$(ls bin/*.apk | head -n 1)
        curl -F chat_id="${TELEGRAM_CHAT_ID}" -F document=@"${APK_PATH}" https://telegram.org{TELEGRAM_TOKEN}/sendDocument
